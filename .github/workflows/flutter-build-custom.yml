# flutter-build-custom.yml — Custom RustDesk Build with White-Label Branding
#
# This is a workflow for building branded RustDesk clients.
# Place this file at: .github/workflows/flutter-build-custom.yml in your fork.
#
# SETUP REQUIRED:
#   1. Go to repo Settings → Secrets and variables → Actions
#   2. Create a secret named CUSTOM_CONFIG with the contents of custom-config.json
#   3. Place your icon assets in assets/icons/ and commit them
#   4. Ensure scripts/apply-branding.py and assets/icons/ are committed to your fork
#
# The key addition vs upstream is the "Apply custom branding" step in each job,
# which injects your config from GitHub Secrets before compilation begins.

name: Custom RustDesk Build

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 1.4.6)"
        required: false
        default: "1.4.6"

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "a34c873a9717a888f58dc05571dde15c12c4f9ab"
  VERSION: ${{ github.event.inputs.version || '1.4.6' }}

jobs:
  # ===========================================================================
  # WINDOWS BUILD
  # ===========================================================================
  build-windows:
    runs-on: windows-2022
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply custom branding
        shell: bash
        env:
          CUSTOM_CONFIG: ${{ secrets.CUSTOM_CONFIG }}
        run: |
          echo "$CUSTOM_CONFIG" > custom-config.json
          python3 scripts/apply-branding.py --config custom-config.json --assets assets/icons/

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace Flutter engine with RustDesk custom engine
        shell: powershell
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          $flutterRoot = (Get-Command flutter).Source | Split-Path | Split-Path
          mv -Force windows-x64-release/* "$flutterRoot/bin/cache/artifacts/engine/windows-x64-release/"

      - name: Patch Flutter
        shell: bash
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          if [ -f .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff ]; then
            cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$FLUTTER_DIR/"
            cd "$FLUTTER_DIR"
            git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

      - name: Build RustDesk
        shell: powershell
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: Find Runner.res for portable packer
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res" | head -1)
          if [ -n "$runner_res" ]; then
            mkdir -p ./libs/portable
            cp "$runner_res" ./libs/portable/Runner.res
          fi

      - name: Build portable self-extracting exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml || true
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe "./SignOutput/rustdesk-${{ env.VERSION }}-x86_64.exe"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build MSI installer
        shell: bash
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          mv ./Package/bin/x64/Release/en-us/Package.msi "../../SignOutput/rustdesk-${{ env.VERSION }}-x86_64.msi"
          popd

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-client-windows
          path: |
            SignOutput/rustdesk-*.exe
            SignOutput/rustdesk-*.msi

  # ===========================================================================
  # LINUX BUILD
  # ===========================================================================
  build-linux:
    runs-on: ubuntu-22.04
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply custom branding
        env:
          CUSTOM_CONFIG: ${{ secrets.CUSTOM_CONFIG }}
        run: |
          echo "$CUSTOM_CONFIG" > custom-config.json
          python3 scripts/apply-branding.py --config custom-config.json --assets assets/icons/

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang cmake curl gcc git g++ \
            libayatana-appindicator3-dev libasound2-dev \
            libclang-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgtk-3-dev \
            libpam0g-dev libpulse-dev libva-dev libxcb-randr0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev \
            nasm ninja-build pkg-config python3 python3-pip rpm \
            unzip wget xz-utils libssl-dev libfuse2 libarchive-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ubuntu-22.04

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          if [ -f .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff ]; then
            cd "$FLUTTER_DIR"
            git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true
          fi

      - name: Flutter workaround for issue 133533
        run: |
          FLUTTER_DIR=$(dirname $(which flutter))
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' \
            "$FLUTTER_DIR/../packages/flutter/lib/src/scheduler/binding.dart" || true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux

      - name: Show version info
        run: |
          clang --version || true
          rustc -V
          cargo -V
          flutter --version
          cmake --version

      - name: Build RustDesk
        run: |
          export CARGO_INCREMENTAL=0
          export DEB_ARCH=amd64
          python3 ./build.py --flutter --hwcodec

      - name: Rename deb packages
        run: |
          for name in rustdesk*??.deb; do
            mv "$name" "${name%%.deb}-x86_64.deb" 2>/dev/null || true
          done

      - name: Build AppImage
        run: |
          # Install appimage-builder
          pip3 install git+https://github.com/rustdesk-org/appimage-builder.git

          # Prepare AppImage directory
          if [ -d appimage ]; then
            # Copy the built deb into appimage dir
            cp rustdesk-*x86_64.deb appimage/rustdesk.deb 2>/dev/null || \
              cp rustdesk*.deb appimage/rustdesk.deb 2>/dev/null || true

            cd appimage
            if [ -f AppImageBuilder-x86_64.yml ]; then
              appimage-builder --skip-tests --recipe ./AppImageBuilder-x86_64.yml
              mv *.AppImage ../ 2>/dev/null || true
            fi
            cd ..
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-client-linux
          path: |
            rustdesk-*.deb
            rustdesk-*.AppImage

  # ===========================================================================
  # MACOS BUILD
  # ===========================================================================
  build-macos:
    runs-on: macos-14
    env:
      MAC_RUST_VERSION: "1.81"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply custom branding
        env:
          CUSTOM_CONFIG: ${{ secrets.CUSTOM_CONFIG }}
        run: |
          echo "$CUSTOM_CONFIG" > custom-config.json
          python3 scripts/apply-branding.py --config custom-config.json --assets assets/icons/

      - name: Install build dependencies
        run: |
          brew install llvm create-dmg nasm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          if [ -f .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff ]; then
            cd "$FLUTTER_DIR"
            git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true
          fi

      - name: Flutter workaround for issue 133533
        run: |
          FLUTTER_DIR=$(dirname $(which flutter))
          sed -i '' -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' \
            "$FLUTTER_DIR/../packages/flutter/lib/src/scheduler/binding.dart" || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-14

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet arm64-osx --x-install-root="$VCPKG_ROOT/installed"
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: arm64-osx

      - name: Show version info
        run: |
          clang --version || true
          rustc -V
          cargo -V
          flutter --version
          cmake --version

      - name: Build RustDesk
        run: |
          python3 ./build.py --flutter --hwcodec --unix-file-copy-paste

      - name: Create DMG
        run: |
          # Patch create-dmg to allow more unmounting attempts
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG" || echo "$CREATE_DMG")"
          sed -i '' -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG" 2>/dev/null || true

          APP_NAME=$(find flutter/build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -print -quit | xargs basename 2>/dev/null)
          if [ -z "$APP_NAME" ]; then
            APP_NAME="RustDesk.app"
          fi

          create-dmg --icon "$APP_NAME" 200 190 \
            --hide-extension "$APP_NAME" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "rustdesk-${{ env.VERSION }}-aarch64.dmg" \
            "flutter/build/macos/Build/Products/Release/$APP_NAME"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-client-macos
          path: |
            rustdesk-*.dmg

  # ===========================================================================
  # RELEASE — Creates a GitHub Release with all platform artifacts
  # ===========================================================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "JAFO Help Desk v${{ env.VERSION }}"
          draft: true
          files: |
            artifacts/custom-client-windows/**
            artifacts/custom-client-linux/**
            artifacts/custom-client-macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
